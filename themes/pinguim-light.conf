# Pinguim Light Theme for Tmux
# Matching Neovim pinnord light colorscheme

# Visual settings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# Copy mode - usando foam para destaque
setw -g mode-style 'fg=#faf4ed bg=#56949f bold'

# Panes - bordas com hierarquia
set -g pane-border-style 'fg=#dfdad9'        # Borda inativa (baixa evidência)
set -g pane-active-border-style 'fg=#575279' # Borda ativa (máxima evidência)

# ----------------------------------------
# STATUS BAR
set -g status-interval 2
set -g status 2
set -g status-position top
set -g status-justify left

# Status bar com background transparente
set -g status-style 'bg=default fg=#797593'

# Left side - session name com média evidência
set -g status-left '#[fg=#797593]#S  '
set -g status-left-length 150

set -g status-format[1] " " # spacer line

# Right side - info do sistema
set -g status-right-length 150
set -g status-right '#(~/.config/tmux/scripts/current_dir.sh) #[fg=#797593] 󰻀  '

# Windows - hierarquia clara entre ativa e inativa
setw -g window-status-current-format ' #I/#W '
setw -g window-status-current-style 'fg=#575279'  # Janela ativa (máxima evidência)

setw -g window-status-style 'fg=#9893a5'               # Janelas inativas (baixa evidência)
setw -g window-status-format ' #I/#W '

setw -g window-status-bell-style 'fg=#faf4ed bg=#b4637a bold'  # Notificações urgentes

# Messages - máxima evidência
set -g message-style 'fg=#575279 bg=default bold'
set -g message-command-style 'fg=#575279 bg=default bold'

# Clock mode
setw -g clock-mode-colour '#575279'
