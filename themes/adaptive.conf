# Adaptive Theme for Tmux
# Automatically switches between dark and light theme based on system appearance

# Use if-shell to detect system theme and load the appropriate config
if-shell '[ "$(defaults read -g AppleInterfaceStyle 2>/dev/null)" = "Dark" ]' \
    'source-file ~/.config/tmux/themes/pinguim.conf' \
    'source-file ~/.config/tmux/themes/solarized-light.conf'
