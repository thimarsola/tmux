# Solarized Light Theme for Tmux
# Based on Ethan Schoonover's Solarized color scheme

# Solarized Light color definitions
# Base colors:
# base3:   #fdf6e3  (background)
# base2:   #eee8d5  (background highlights)
# base1:   #93a1a1  (comments / secondary content)
# base0:   #839496  (body text / default code)
# base00:  #657b83  (primary content)
# base01:  #586e75  (optional emphasized content)
# base02:  #073642  (background highlights dark)
# base03:  #002b36  (background dark)
# Accent colors:
# yellow:  #b58900
# orange:  #cb4b16
# red:     #dc322f
# magenta: #d33682
# violet:  #6c71c4
# blue:    #268bd2
# cyan:    #2aa198
# green:   #859900

# Visual settings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# Copy mode - usando cyan para destaque
setw -g mode-style 'fg=#fdf6e3 bg=#2aa198 bold'

# Panes - bordas com hierarquia
set -g pane-border-style 'fg=#93a1a1'        # Borda inativa (baixa evidência)
set -g pane-active-border-style 'fg=#268bd2' # Borda ativa (azul solarized)

# ----------------------------------------
# STATUS BAR
set -g status-interval 2
set -g status 2
set -g status-position top
set -g status-justify left

# Status bar com background do solarized light
set -g status-style 'bg=#eee8d5 fg=#657b83'

# Left side - session name
set -g status-left '#[fg=#268bd2,bold]#S  '
set -g status-left-length 150

set -g status-format[1] " " # spacer line

# Right side - info do sistema
set -g status-right-length 150
set -g status-right '#(~/.config/tmux/scripts/current_dir.sh) #[fg=#657b83]   '

# Windows - hierarquia clara entre ativa e inativa
setw -g window-status-current-format ' #I/#W '
setw -g window-status-current-style 'fg=#002b36 bg=#eee8d5 bold'  # Janela ativa (texto escuro)

setw -g window-status-style 'fg=#93a1a1 bg=#eee8d5'               # Janelas inativas
setw -g window-status-format ' #I/#W '

setw -g window-status-bell-style 'fg=#fdf6e3 bg=#dc322f bold'  # Notificações urgentes (vermelho)

# Messages
set -g message-style 'fg=#002b36 bg=#eee8d5 bold'
set -g message-command-style 'fg=#002b36 bg=#eee8d5 bold'

# Clock mode
setw -g clock-mode-colour '#268bd2'
